name: CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image tag
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read image tag
        run: echo "IMAGE_TAG=$(cat image-tag.txt)" >> $GITHUB_ENV

      - name: Update green deployment image
        run: |
          sed -i "s|image: updateinformatica/claude-devops:.*|image: updateinformatica/claude-devops:${IMAGE_TAG}|" clouds/azure/k8s/kube-news-green.yaml

      - name: Ensure traffic routes to green
        run: |
          sed -i 's/^    version: blue$/    version: green/' clouds/azure/k8s/kube-news-blue.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clouds/azure/k8s/kube-news-green.yaml clouds/azure/k8s/kube-news-blue.yaml
          git diff --staged --quiet || git commit -m "ci: deploy green image ${IMAGE_TAG}"
          git push
