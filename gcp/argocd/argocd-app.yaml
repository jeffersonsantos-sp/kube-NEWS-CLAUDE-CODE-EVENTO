apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-news-gcp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jeffersonsantos-sp/kube-NEWS-CLAUDE-CODE-EVENTO.git
    targetRevision: main
    path: gcp/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-news
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
