apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-news-green
  namespace: kube-news
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kube-news
      version: green
  template:
    metadata:
      labels:
        app: kube-news
        version: green
    spec:
      containers:
        - name: kube-news
          image: updateinformatica/claude-devops:v1.2.6
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: DB_HOST
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: DB_USERNAME
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: DB_PORT
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kube-news-secret
                  key: DB_PASSWORD
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: kube-news-preview
  namespace: kube-news
spec:
  type: ClusterIP
  selector:
    app: kube-news
    version: green
  ports:
    - port: 8080
      targetPort: 8080
