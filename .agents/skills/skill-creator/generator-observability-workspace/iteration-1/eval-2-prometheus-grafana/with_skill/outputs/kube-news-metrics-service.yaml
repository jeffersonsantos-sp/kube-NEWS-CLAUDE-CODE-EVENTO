# kube-news-metrics-service.yaml
# Dedicated ClusterIP Service for /metrics scraping (separate from LoadBalancer)
# App is already instrumented with prom-client + express-prom-bundle on port 8080
# Selects both blue and green pods via the shared label app: kube-news

apiVersion: v1
kind: Service
metadata:
  name: kube-news-metrics
  namespace: kube-news
  labels:
    app: kube-news-metrics
spec:
  type: ClusterIP
  selector:
    app: kube-news
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
