# values-loki-stack.yaml
# Provider: Azure AKS
# Storage class: managed-csi
# Generated by: generator-observability skill

loki:
  persistence:
    enabled: true
    storageClassName: managed-csi
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

promtail:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Grafana is already installed via kube-prometheus-stack
grafana:
  enabled: false
