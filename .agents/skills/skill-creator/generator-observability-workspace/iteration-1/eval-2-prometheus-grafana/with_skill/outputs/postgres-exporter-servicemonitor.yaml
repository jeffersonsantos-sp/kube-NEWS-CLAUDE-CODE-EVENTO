# postgres-exporter-servicemonitor.yaml
# ServiceMonitor for postgres-exporter
# Scrapes PostgreSQL metrics from port 9187

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter
  namespace: kube-news
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - kube-news
  selector:
    matchLabels:
      app: postgres-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
