# =============================================================================
# ConfigMap com o dashboard JSON do kube-news para o Grafana
#
# O Grafana é configurado (via dashboardsConfigMaps no values) para montar
# este ConfigMap em /var/lib/grafana/dashboards/kube-news/
#
# Dashboard cobre:
#   - CPU e memória dos pods kube-news e postgres
#   - Taxa de requisições HTTP por rota e método
#   - Latência P50/P95/P99 por rota
#   - Taxa de erros 5xx
#   - Métricas Node.js: heap, event loop lag
#   - Conexões PostgreSQL e status pg_up
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kube-news
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  kube-news-overview.json: |
    {
      "title": "KubeNews — Overview",
      "uid": "kube-news-overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "tags": ["kube-news"],
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "constant",
            "query": "kube-news",
            "current": { "value": "kube-news" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage — kube-news pods",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"kube-news\", container=\"kube-news\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Memory Usage — kube-news pods",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"kube-news\", container=\"kube-news\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "CPU Usage — postgres pod",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"kube-news\", container=\"postgres\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Memory Usage — postgres pod",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"kube-news\", container=\"postgres\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "HTTP Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_count{namespace=\"kube-news\"}[5m])) by (path, method)",
              "legendFormat": "{{method}} {{path}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "HTTP Latency P50 / P95 / P99",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{namespace=\"kube-news\"}[5m])) by (le))",
              "legendFormat": "P50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"kube-news\"}[5m])) by (le))",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=\"kube-news\"}[5m])) by (le))",
              "legendFormat": "P99",
              "refId": "C"
            }
          ]
        },
        {
          "id": 7,
          "title": "HTTP Error Rate (5xx %)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 24, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "lineWidth": 2,
                "thresholdsStyle": { "mode": "area" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.05 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_count{namespace=\"kube-news\", status_code=~\"5..\"}[5m])) / sum(rate(http_request_duration_seconds_count{namespace=\"kube-news\"}[5m]))",
              "legendFormat": "Error Rate",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Node.js Heap Used",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 24, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(nodejs_heap_size_used_bytes{namespace=\"kube-news\"}) by (pod)",
              "legendFormat": "{{pod}} heap used",
              "refId": "A"
            },
            {
              "expr": "sum(nodejs_heap_size_total_bytes{namespace=\"kube-news\"}) by (pod)",
              "legendFormat": "{{pod}} heap total",
              "refId": "B"
            }
          ]
        },
        {
          "id": 9,
          "title": "Node.js Event Loop Lag",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 32, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(nodejs_eventloop_lag_seconds{namespace=\"kube-news\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "title": "PostgreSQL — Conexões Ativas",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 32, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "pg_stat_activity_count{namespace=\"kube-news\"}",
              "legendFormat": "conexões ativas",
              "refId": "A"
            }
          ]
        },
        {
          "id": 11,
          "title": "PostgreSQL — Status (pg_up)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 40, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "pg_up{namespace=\"kube-news\"}",
              "legendFormat": "PostgreSQL",
              "refId": "A"
            }
          ]
        },
        {
          "id": 12,
          "title": "PostgreSQL — Tamanho do Banco",
          "type": "stat",
          "gridPos": { "x": 6, "y": 40, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "unit": "bytes" }
          },
          "targets": [
            {
              "expr": "pg_database_size_bytes{datname=\"kubedevnews\"}",
              "legendFormat": "kubedevnews",
              "refId": "A"
            }
          ]
        },
        {
          "id": 13,
          "title": "Pods Disponíveis — kube-news",
          "type": "stat",
          "gridPos": { "x": 12, "y": 40, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "green", "value": 2 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"kube-news\"}",
              "legendFormat": "{{deployment}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 14,
          "title": "Requisições Totais (http_requests_total)",
          "type": "stat",
          "gridPos": { "x": 18, "y": 40, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "unit": "short" }
          },
          "targets": [
            {
              "expr": "sum(http_requests_total{namespace=\"kube-news\"})",
              "legendFormat": "total",
              "refId": "A"
            }
          ]
        }
      ]
    }
