# kube-news-metrics-service.yaml
# Service ClusterIP dedicado para scrape de métricas da app kube-news
# Seleciona pods de ambas as versões (blue e green) via label app: kube-news
# Gerado por: generator-observability skill

apiVersion: v1
kind: Service
metadata:
  name: kube-news-metrics
  namespace: kube-news
  labels:
    app: kube-news-metrics
spec:
  type: ClusterIP
  selector:
    app: kube-news
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
