# kube-prometheus-stack — valores para AKS (kube-news)
# Helm chart: prometheus-community/kube-prometheus-stack
# Namespace alvo: monitoring
#
# Componentes gerenciados pelo AKS — não acessíveis para scrape
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

# Desabilita regras para componentes gerenciados pelo AKS
defaultRules:
  rules:
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeControllerManager: false
    etcd: false
    kubeProxy: false

# Prometheus — descobre ServiceMonitors em todos os namespaces
prometheus:
  prometheusSpec:
    retention: 30d
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: managed-csi
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

# Grafana — LoadBalancer + Loki como datasource adicional
grafana:
  adminPassword: "KubeNews@Monitoring2026"
  service:
    type: LoadBalancer
  persistence:
    enabled: true
    storageClassName: managed-csi
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-stack.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false

# AlertManager — SMTP para jefferson@empresa.com
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  config:
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'jefferson@empresa.com'
      smtp_auth_username: 'jefferson@empresa.com'
      smtp_auth_password: 'REPLACE_WITH_APP_PASSWORD'
      smtp_require_tls: true
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'email-jefferson'
      routes:
        - matchers:
            - severity="critical"
          receiver: 'email-jefferson'
          group_wait: 10s
          repeat_interval: 4h
        - matchers:
            - severity="warning"
          receiver: 'email-jefferson'
    receivers:
      - name: 'null'
      - name: 'email-jefferson'
        email_configs:
          - to: 'jefferson@empresa.com'
            send_resolved: true
            headers:
              Subject: '[KubeNews/AKS] {{ .Status | toUpper }} - {{ .GroupLabels.alertname }}'
    inhibit_rules:
      - source_matchers:
          - 'severity="critical"'
        target_matchers:
          - 'severity="warning"'
        equal:
          - alertname
          - namespace
