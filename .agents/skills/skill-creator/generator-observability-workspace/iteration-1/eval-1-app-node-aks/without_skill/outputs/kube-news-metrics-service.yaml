# Service dedicado para expor o endpoint /metrics do kube-news ao Prometheus
# A app Node.js usa express-prom-bundle que expõe métricas na porta 8080 em /metrics
apiVersion: v1
kind: Service
metadata:
  name: kube-news-metrics
  namespace: kube-news
  labels:
    app: kube-news-metrics
spec:
  type: ClusterIP
  selector:
    app: kube-news
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
