# =============================================================================
# postgres-exporter — exporta métricas do PostgreSQL para o Prometheus
# Reutiliza o Secret e ConfigMap já existentes no namespace kube-news
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: kube-news
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          env:
            - name: PG_USER
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: DB_USERNAME
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kube-news-secret
                  key: DB_PASSWORD
            - name: DATA_SOURCE_NAME
              value: "postgresql://$(PG_USER):$(PG_PASSWORD)@postgres:5432/kubedevnews?sslmode=disable"
          ports:
            - name: metrics
              containerPort: 9187
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9187
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: kube-news
  labels:
    app: postgres-exporter
spec:
  type: ClusterIP
  selector:
    app: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
