# =============================================================================
# Service auxiliar para expor /metrics do kube-news ao Prometheus
# O ServiceMonitor aponta para este Service (label: app=kube-news-metrics)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: kube-news-metrics
  namespace: kube-news
  labels:
    app: kube-news-metrics
spec:
  type: ClusterIP
  selector:
    # Seleciona os pods do Deployment kube-news (blue ou green)
    app: kube-news
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
