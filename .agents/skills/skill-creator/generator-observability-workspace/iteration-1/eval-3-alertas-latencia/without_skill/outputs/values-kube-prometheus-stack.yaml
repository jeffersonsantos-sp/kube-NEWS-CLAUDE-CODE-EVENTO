# =============================================================================
# kube-prometheus-stack — valores customizados para kube-news
# Instalar com:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     -f values-kube-prometheus-stack.yaml
# =============================================================================

# Componentes gerenciados pelo AKS — não acessíveis para scrape
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

# Desabilita regras de alerta para componentes gerenciados
defaultRules:
  rules:
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeControllerManager: false
    etcd: false
    kubeProxy: false

# Prometheus — descobre ServiceMonitors em todos os namespaces
prometheus:
  prometheusSpec:
    # Retenção de 30 dias
    retention: 30d
    # Permitir descoberta de ServiceMonitors em qualquer namespace
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          # Ajuste o storageClassName para seu ambiente (ex: standard, gp2, managed-csi)
          storageClassName: managed-csi
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

# Grafana — interface de dashboards
grafana:
  adminPassword: "KubeNews@Monitoring2026"
  service:
    type: LoadBalancer
  persistence:
    enabled: true
    storageClassName: managed-csi
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi
  # Loki como fonte de dados adicional (logs)
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-stack.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false

# AlertManager — roteia alertas para e-mail
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  config:
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'updateinformatica2019@gmail.com'
      smtp_auth_username: 'updateinformatica2019@gmail.com'
      # Gere uma App Password no Google: https://myaccount.google.com/apppasswords
      smtp_auth_password: 'REPLACE_WITH_GMAIL_APP_PASSWORD'
      smtp_require_tls: true
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'email-notifications'
      routes:
        # Alertas críticos repetem mais rápido
        - matchers:
            - severity="critical"
          repeat_interval: 1h
          receiver: 'email-notifications'
        # Alertas de latência/warning
        - matchers:
            - severity="warning"
          repeat_interval: 4h
          receiver: 'email-notifications'
    receivers:
      - name: 'null'
      - name: 'email-notifications'
        email_configs:
          - to: 'updateinformatica2019@gmail.com'
            send_resolved: true
            headers:
              Subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }} — kube-news'
    inhibit_rules:
      - source_matchers:
          - 'severity="critical"'
        target_matchers:
          - 'severity="warning"'
        equal:
          - alertname
          - namespace
