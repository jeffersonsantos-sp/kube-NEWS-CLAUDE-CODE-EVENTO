# =============================================================================
# ConfigMap para auto-importar o dashboard do kube-news no Grafana
# O kube-prometheus-stack carrega dashboards via sidecar do diretório configurado
# Aplique APÓS instalar o kube-prometheus-stack:
#   kubectl apply -f grafana-dashboard-configmap.yaml
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-news-dashboard
  namespace: monitoring
  labels:
    # Esta label faz o sidecar do Grafana importar automaticamente o dashboard
    grafana_dashboard: "1"
data:
  kube-news-dashboard.json: |
    {
      "annotations": { "list": [] },
      "description": "Dashboard de observabilidade para kube-news",
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Status dos Pods",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "id": 1,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "title": "Restarts (5min)",
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"kube-news\"}[5m]))",
              "legendFormat": "Restarts",
              "refId": "A"
            }
          ],
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "id": 2,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "title": "Pods Ready",
          "targets": [
            {
              "expr": "sum(kube_pod_status_ready{namespace=\"kube-news\", condition=\"true\"})",
              "legendFormat": "Pods Ready",
              "refId": "A"
            }
          ],
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "id": 3,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "title": "Requisicoes/s",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"kube-news\"}[1m]))",
              "legendFormat": "req/s",
              "refId": "A"
            }
          ],
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "palette-classic" }
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 5 },
          "id": 10,
          "options": { "tooltip": { "mode": "multi" } },
          "title": "Latencia HTTP (P50 / P95 / P99)",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{namespace=\"kube-news\"}[5m])) by (le))",
              "legendFormat": "P50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"kube-news\"}[5m])) by (le))",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=\"kube-news\"}[5m])) by (le))",
              "legendFormat": "P99",
              "refId": "C"
            }
          ],
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percentunit" } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 13 },
          "id": 20,
          "title": "Taxa de Erros 5xx",
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_count{namespace=\"kube-news\",status_code=~\"5..\"}[5m])) / sum(rate(http_request_duration_seconds_count{namespace=\"kube-news\"}[5m]))",
              "legendFormat": "Erros 5xx",
              "refId": "A"
            }
          ],
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 13 },
          "id": 21,
          "title": "PostgreSQL - Conexoes Ativas",
          "targets": [
            {
              "expr": "pg_stat_activity_count{namespace=\"kube-news\", state=\"active\"}",
              "legendFormat": "Conexoes Ativas",
              "refId": "A"
            }
          ],
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["kube-news", "kubernetes"],
      "time": { "from": "now-1h", "to": "now" },
      "title": "kube-news — Observabilidade",
      "uid": "kube-news-obs",
      "version": 1
    }
