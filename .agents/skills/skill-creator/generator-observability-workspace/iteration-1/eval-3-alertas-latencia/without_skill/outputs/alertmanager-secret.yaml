# =============================================================================
# Secret para o App Password do Gmail usado pelo AlertManager
# COMO GERAR O APP PASSWORD:
#   1. Acesse: https://myaccount.google.com/apppasswords
#   2. Selecione "Outro (nome personalizado)" → digite "AlertManager kube-news"
#   3. Copie a senha gerada (16 caracteres sem espaços)
#   4. Substitua REPLACE_WITH_GMAIL_APP_PASSWORD abaixo e encode em base64:
#      echo -n "suasenhaaqui" | base64
#
# ATENÇÃO: Este arquivo NÃO deve ser commitado no Git.
# Adicione ao .gitignore: alertmanager-secret.yaml
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-gmail-secret
  namespace: monitoring
type: Opaque
stringData:
  # Substitua pelo App Password real gerado no Google
  gmail-app-password: "REPLACE_WITH_GMAIL_APP_PASSWORD"
