# =============================================================================
# loki-stack — coleta e armazenamento de logs do kube-news
# Instalar com:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#   helm upgrade --install loki-stack grafana/loki-stack \
#     --namespace monitoring --create-namespace \
#     -f values-loki-stack.yaml
# =============================================================================

# Loki — armazenamento persistente de logs
loki:
  persistence:
    enabled: true
    # Ajuste para o storageClass disponível no seu cluster
    storageClassName: managed-csi
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi
  config:
    chunk_store_config:
      max_look_back_period: 720h   # 30 dias
    table_manager:
      retention_deletes_enabled: true
      retention_period: 720h

# Promtail — agente DaemonSet que coleta logs de todos os containers
promtail:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  config:
    snippets:
      # Adiciona labels extras para facilitar filtros no Grafana
      extraRelabelConfigs:
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - action: replace
          source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - action: replace
          source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        - action: replace
          source_labels: [__meta_kubernetes_container_name]
          target_label: container

# Grafana já instalado via kube-prometheus-stack — não instalar de novo
grafana:
  enabled: false
