apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kube-news-alerts
  namespace: monitoring
spec:
  groups:
    - name: kube-news.pods
      rules:
        # Detecta pods reiniciando com frequência (CrashLoopBackOff)
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="kube-news"}[5m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} em CrashLoop"
            description: "Pod {{ $labels.pod }} no namespace {{ $labels.namespace }} reiniciando com frequência. Verifique logs com: kubectl logs {{ $labels.pod }} -n kube-news --previous"

        # Detecta pods que não ficam Ready (podem estar caindo ou falhando probes)
        - alert: PodNotReady
          expr: kube_pod_status_ready{namespace="kube-news", condition="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} não está Ready"
            description: "Pod {{ $labels.pod }} no namespace kube-news não está pronto há 5 minutos. Verifique: kubectl describe pod {{ $labels.pod }} -n kube-news"

    - name: kube-news.http
      rules:
        # Alerta quando P95 de latência HTTP supera 2 segundos por 5 minutos
        # Requer: express-prom-bundle (detectado no package.json) expondo http_request_duration_seconds
        - alert: HighHTTPLatency
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{namespace="kube-news"}[5m])) by (le, path)
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Alta latência HTTP no kube-news"
            description: "P95 de latência na rota {{ $labels.path }} acima de 2s por mais de 5 minutos. Latência atual: {{ $value | humanizeDuration }}"

        # Alerta quando mais de 5% das requisições retornam erro 5xx
        - alert: HighHTTPErrorRate
          expr: |
            sum(rate(http_request_duration_seconds_count{namespace="kube-news", status_code=~"5.."}[5m]))
            /
            sum(rate(http_request_duration_seconds_count{namespace="kube-news"}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Taxa de erro HTTP acima de 5%"
            description: "Mais de 5% das requisições retornando 5xx no kube-news. Taxa atual: {{ $value | humanizePercentage }}"

    - name: kube-news.storage
      rules:
        # Alerta quando PVC ultrapassa 80% de capacidade
        - alert: PVCUsageHigh
          expr: |
            (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} acima de 80%"
            description: "Volume {{ $labels.persistentvolumeclaim }} com utilização crítica de armazenamento: {{ $value | humanizePercentage }}. Considere aumentar o PVC ou limpar dados."
