apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kube-news
  namespace: kube-news
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # GCP: nginx ingress usa health check em /healthz (porta 10254) — sem problemas de appProtocol
    nginx.ingress.kubernetes.io/use-regex: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - jfs-devops.shop
      secretName: kube-news-tls
  rules:
    - host: jfs-devops.shop
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-news
                port:
                  number: 80
