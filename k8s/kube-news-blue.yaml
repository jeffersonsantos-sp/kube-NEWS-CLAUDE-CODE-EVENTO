apiVersion: v1
kind: Namespace
metadata:
  name: kube-news
---
apiVersion: v1
kind: Secret
metadata:
  name: kube-news-secret
  namespace: kube-news
type: Opaque
stringData:
  DB_PASSWORD: "Pg#123"
  POSTGRES_PASSWORD: "Pg#123"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-news-config
  namespace: kube-news
data:
  DB_HOST: postgres
  DB_DATABASE: kubedevnews
  DB_USERNAME: kubedevnews
  DB_PORT: "5432"
  POSTGRES_DB: kubedevnews
  POSTGRES_USER: kubedevnews
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: kube-news
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: kube-news
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kube-news-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "kubedevnews", "-d", "kubedevnews"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "kubedevnews", "-d", "kubedevnews"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kube-news
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-news-blue
  namespace: kube-news
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kube-news
      version: blue
  template:
    metadata:
      labels:
        app: kube-news
        version: blue
    spec:
      containers:
        - name: kube-news
          image: updateinformatica/claude-devops:1.0
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: DB_HOST
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: DB_USERNAME
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: DB_PORT
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kube-news-secret
                  key: DB_PASSWORD
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: kube-news
  namespace: kube-news
spec:
  type: ClusterIP
  selector:
    app: kube-news
    version: green
  ports:
    - port: 80
      targetPort: 8080
